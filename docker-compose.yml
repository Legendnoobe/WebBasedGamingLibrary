version: '3.8'

services:
  wbgl:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/backend/data
      - ./games:/games:ro # Mount your games folder (read-only)
    environment:
      - PORT=3001
      - STEAMGRIDDB_API_KEY=${STEAMGRIDDB_API_KEY}
    restart: unless-stopped
