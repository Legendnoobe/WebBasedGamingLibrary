name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Run Lint (Optional)
      # run: npm run lint
      run: echo "Linting steps would go here"
